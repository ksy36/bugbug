services:
  autowebcompat-repro-broker:
    build:
      context: ../..
      dockerfile: agents/autowebcompat-repro/Dockerfile
      target: broker
    environment:
      BUGZILLA_API_URL: ${BUGZILLA_API_URL}
      BUGZILLA_API_KEY: ${BUGZILLA_API_KEY}
    expose:
      - "8765"

  autowebcompat-repro-agent:
    build:
      context: ../..
      dockerfile: agents/autowebcompat-repro/Dockerfile
      target: agent
    environment:
      - RUN_ID
      - BUG_DATA
      - BUG_ID
      - BUGZILLA_MCP_URL=http://autowebcompat-repro-broker:8765/mcp
      - BACKEND
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?error}
      # Needed only for the codex backend. Fail loudly if selected without a
      # key (an empty value surfaces as a confusing 401 from the app-server);
      # a plain unset default keeps the claude path working without it.
      - OPENAI_API_KEY=${OPENAI_API_KEY:?set OPENAI_API_KEY (export it) to run BACKEND=codex}
      # No uploader locally: summary/logs/attachments are written under
      # /artifacts/<run_id>, bind-mounted to the host's ~/hackbot/artifacts.
      - ARTIFACTS_DIR=/artifacts
    volumes:
      - ${HOME}/hackbot/artifacts:/artifacts
    depends_on:
      autowebcompat-repro-broker:
        condition: service_started
