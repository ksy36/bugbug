<!doctype html>
<meta charset="utf-8">
<title>Flex iframe aspect-ratio sizing divergence</title>
<style>
  /* At a 1366×768 viewport the stage is 1366×704.
     Chrome makes the iframe 1251.55×703.98 (16:9), filling the available height.
     Firefox keeps its 300px intrinsic iframe width, giving 300×168.75 instead.
     The fixed-position-style game content in srcdoc then has far too little room and overlaps. */
  html, body { margin: 0; height: 100%; }
  .stage { height: 704px; display: flex; align-items: center; justify-content: center; background: #222; }
  iframe { aspect-ratio: 16 / 9; max-width: 100%; max-height: 100%; border: 0; background: white; }
</style>
<div class="stage">
  <iframe title="game" srcdoc="<!doctype html><style>body{margin:0;overflow:hidden;font:22px sans-serif}.panel{position:absolute;width:250px;height:110px;padding:14px;background:#52a;color:white}.a{left:12px;top:12px}.b{left:290px;top:12px;background:#a35}.c{left:568px;top:12px;background:#375}</style><div class='panel a'>Game panel A</div><div class='panel b'>Game panel B</div><div class='panel c'>Game panel C</div>"></iframe>
</div>
